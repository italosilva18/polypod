server:
  host: "0.0.0.0"
  port: 8080

database:
  enabled: false

ai:
  provider: "deepseek"
  base_url: "https://api.deepseek.com/v1"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-chat"
  max_tokens: 2048
  temperature: 0.3

embedding:
  enabled: false

telegram:
  enabled: false

whatsapp:
  enabled: false

rest:
  enabled: true
  api_keys:
    - "test"

rate:
  requests_per_minute: 30
  burst_size: 10

log:
  level: "debug"
  format: "text"
